{{- $defaults := .Values.tenants.ingressDefaults | default dict }}
{{- $defaultIssuer := index $defaults "certManagerClusterIssuer" | default "letsencrypt-prod" }}
{{- $defaultClass := index $defaults "ingressClassName" | default "nginx" }}
{{- range $slug, $cfg := (.Values.tenants.ingress | default dict) }}
{{- $enabled := true -}}
{{- if hasKey $cfg "enabled" }}{{- $enabled = $cfg.enabled }}{{- end }}
{{- if and $cfg $enabled $cfg.host $cfg.tlsSecretName }}
---
# Host dédié → même portail ; aligner chaque host avec frontend.domainTenantMap (redirect / → /tenants/<slug>/residents)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $.Release.Name }}-tenant-{{ $slug }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $cfg.certManagerClusterIssuer | default $defaultIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ $cfg.ingressClassName | default $defaultClass }}
  rules:
    - host: {{ $cfg.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal-{{ $.Release.Name }}-frontend
                port:
                  number: 80
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: portal-{{ $.Release.Name }}-backend
                port:
                  number: 80
  tls:
    - hosts:
        - {{ $cfg.host | quote }}
      secretName: {{ $cfg.tlsSecretName }}
{{- end }}
{{- end }}
