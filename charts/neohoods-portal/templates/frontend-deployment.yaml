{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-{{ .Release.Name }}-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: portal-{{ .Release.Name }}-frontend
  template:
    metadata:
      labels:
        app: portal-{{ .Release.Name }}-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: portal-{{ .Release.Name }}-frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          env:
            # Default /api: same-origin calls (avoids CORS when ingress serves /api on each tenant host). Override with absolute URL if needed.
            - name: API_BASE_PATH
              value: {{ .Values.frontend.env.API_BASE_PATH | default "/api" | quote }}
            - name: USE_MOCK_API
              value: "{{ .Values.frontend.env.USE_MOCK_API }}"
            - name: DEMO_MODE
              value: "{{ .Values.frontend.env.DEMO_MODE }}"
            - name: STRIPE_DEMO_MODE
              value: "{{ .Values.frontend.env.STRIPE_DEMO_MODE }}"
            - name: DEFAULT_LOCALE
              value: "{{ .Values.frontend.env.DEFAULT_LOCALE }}"
            # Branding configuration
            - name: BRAND_NAME
              value: "{{ .Values.frontend.env.BRAND_NAME }}"
            - name: BRAND_DISPLAY_NAME
              value: "{{ .Values.frontend.env.BRAND_DISPLAY_NAME }}"
            - name: BRAND_COPYRIGHT
              value: "{{ .Values.frontend.env.BRAND_COPYRIGHT }}"
            - name: BRAND_LOGO
              value: "{{ .Values.frontend.env.BRAND_LOGO }}"
            - name: USAGE_CONDITIONS_VERSION
              value: {{ .Values.frontend.env.USAGE_CONDITIONS_VERSION | default "1" | quote }}
            - name: DOMAIN_TENANT_MAP_JSON
              value: {{ include "neohoods-portal.domainTenantMapJson" . | quote }}
            # Duplicate of image tag for scripts that expect IMAGE_TAG (generate-config-json.cjs fallback)
            - name: IMAGE_TAG
              value: {{ .Values.frontend.image.tag | quote }}
            # Same as image tag by default; override via frontend.env.NEOHOODS_PORTAL_UI_VERSION (e.g. semver vs digest tag)
            - name: NEOHOODS_PORTAL_UI_VERSION
              value: {{ .Values.frontend.env.NEOHOODS_PORTAL_UI_VERSION | default .Values.frontend.image.tag | quote }}
          ports:
            - name: http-server
              containerPort: 80
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 300
            periodSeconds: 5
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 2
            httpGet:
              path: /
              port: 80
          volumeMounts:
            - name: custom-theme
              mountPath: /usr/share/nginx/html/assets/theme/custom-theme.scss
              subPath: custom-theme.scss
      volumes:
        - name: custom-theme
          configMap:
            name: {{ .Values.frontend.theme.configMapName | default (printf "%s-frontend-theme" .Release.Name) }}
{{- end }}