{{- if and .Values.docs.enabled .Values.docs.ingress.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-{{ .Release.Name }}-docs
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.docs.ingress.certManagerClusterIssuer | default .Values.ingress.certManagerClusterIssuer }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.docs.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portal-{{ .Release.Name }}-docs
                port:
                  number: {{ .Values.docs.service.port | default 80 }}
  tls:
    - hosts:
        - {{ .Values.docs.ingress.host | quote }}
      secretName: {{ .Values.docs.ingress.tlsSecretName }}
{{- end }}
