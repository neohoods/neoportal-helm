{{- if and .Values.docs.enabled .Values.docs.ingress.host }}
{{- /* Même logique que ingress-tenants : namespace explicite pour cert-manager / ArgoCD */}}
{{- $g := index .Values "global" }}
{{- $ns := .Release.Namespace }}
{{- if and $g (index $g "namespace") }}{{ $ns = index $g "namespace" }}{{ end }}
{{- $issuer := .Values.docs.ingress.certManagerClusterIssuer | default .Values.ingress.certManagerClusterIssuer | default "letsencrypt-prod" }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portal-{{ .Release.Name }}-docs
  namespace: {{ $ns }}
  annotations:
    cert-manager.io/cluster-issuer: {{ $issuer | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    kubernetes.io/ingress.class: "nginx"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.docs.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: portal-{{ .Release.Name }}-docs
                port:
                  number: {{ .Values.docs.service.port | default 80 }}
  tls:
    - hosts:
        - {{ .Values.docs.ingress.host | quote }}
      secretName: {{ .Values.docs.ingress.tlsSecretName }}
{{- end }}
