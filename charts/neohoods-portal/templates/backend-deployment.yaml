{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-{{ .Release.Name }}-backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: portal-{{ .Release.Name }}-backend
  template:
    metadata:
      labels:
        app: portal-{{ .Release.Name }}-backend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      {{- if and .Values.postgresql.enabled .Values.flyway.enabled (eq (.Values.flyway.globalMigration | default "initContainer") "initContainer") }}
      initContainers:
        - name: wait-and-create-db
          image: postgres:18.1
          command:
            - /bin/sh
            - -c
            - |
              set -e
              export PGPASSWORD="${POSTGRES_PASSWORD}"

              HEADLESS_SERVICE="{{ .Values.global.chatName }}-postgresql.{{ .Values.global.namespace }}.svc.cluster.local"
              POD_FQDN="{{ .Values.global.chatName }}-postgresql-0.{{ .Values.global.chatName }}-postgresql.{{ .Values.global.namespace }}.svc.cluster.local"
              OLD_HEADLESS_SERVICE="{{ .Values.global.chatName }}-postgresql-hl.{{ .Values.global.namespace }}.svc.cluster.local"

              echo "Waiting for PostgreSQL to be ready..."
              PG_HOST=""
              while [ -z "$PG_HOST" ]; do
                if pg_isready -h "$POD_FQDN" -p 5432 -U {{ .Values.postgresql.auth.username }} -d postgres 2>/dev/null; then
                  PG_HOST="$POD_FQDN"
                  echo "PostgreSQL is ready at $PG_HOST (pod FQDN)!"
                  break
                fi
                if pg_isready -h "$HEADLESS_SERVICE" -p 5432 -U {{ .Values.postgresql.auth.username }} -d postgres 2>/dev/null; then
                  PG_HOST="$HEADLESS_SERVICE"
                  echo "PostgreSQL is ready at $PG_HOST (headless service)!"
                  break
                fi
                if pg_isready -h "$OLD_HEADLESS_SERVICE" -p 5432 -U {{ .Values.postgresql.auth.username }} -d postgres 2>/dev/null; then
                  PG_HOST="$OLD_HEADLESS_SERVICE"
                  echo "PostgreSQL is ready at $PG_HOST (old headless service)!"
                  break
                fi
                echo "Waiting for PostgreSQL to be ready..."
                sleep 2
              done

              echo "Checking if database ${POSTGRES_DB} exists..."
              DB_EXISTS=$(psql -h "$PG_HOST" -U "${POSTGRES_USER}" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = '${POSTGRES_DB}'" 2>/dev/null | xargs || echo "")

              if [ "$DB_EXISTS" != "1" ]; then
                echo "Creating database ${POSTGRES_DB}..."
                psql -h "$PG_HOST" -U "${POSTGRES_USER}" -d postgres -c "CREATE DATABASE \"${POSTGRES_DB}\";"
                echo "Database ${POSTGRES_DB} created successfully!"
              else
                echo "Database ${POSTGRES_DB} already exists, skipping creation."
              fi
          env:
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgresql.auth.existingSecret }}
                  key: {{ .Values.postgresql.auth.secretKeys.userPasswordKey }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database }}
        - name: flyway-migrate
          image: "{{ .Values.flyway.image.repository }}:{{ .Values.flyway.image.tag }}"
          imagePullPolicy: {{ .Values.flyway.image.pullPolicy | default "IfNotPresent" }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              {{- if .Values.flyway.repairBeforeMigrate }}
              echo "Flyway repair (global schema) before migrate..."
              flyway -connectRetries=60 repair -locations=filesystem:/flyway/sql-init,filesystem:/flyway/sql-global
              {{- end }}
              exec flyway -connectRetries=60 migrate -locations=filesystem:/flyway/sql-init,filesystem:/flyway/sql-global
          resources:
            {{- if .Values.flyway.resources }}
            {{- toYaml .Values.flyway.resources | nindent 12 }}
            {{- else }}
            requests:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "500Mi"
            limits:
              memory: "512Mi"
              cpu: "500m"
              ephemeral-storage: "2Gi"
            {{- end }}
          env:
            - name: FLYWAY_USER
              value: "{{ .Values.postgresql.auth.username }}"
            - name: FLYWAY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.postgresql.auth.existingSecret }}"
                  key: "{{ .Values.postgresql.auth.secretKeys.userPasswordKey }}"
            - name: FLYWAY_URL
              value: "jdbc:postgresql://{{ .Values.global.chatName }}-postgresql-0.{{ .Values.global.chatName }}-postgresql.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.postgresql.auth.database }}"
            - name: FLYWAY_BASELINE_ON_MIGRATE
              value: "true"
            - name: FLYWAY_CLEAN_DISABLED
              value: "true"
          volumeMounts:
            - name: flyway-sql-init
              mountPath: /flyway/sql-init
            - name: flyway-sql-global
              mountPath: /flyway/sql-global
      {{- end }}
      containers:
        - name: portal-{{ .Release.Name }}-backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.backend.env.SPRING_PROFILES_ACTIVE }}
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70 -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=./heapdump"
            - name: SERVER_PORT
              value: "{{ .Values.backend.env.SERVER_PORT }}"
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/api"
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.global.chatName }}-postgresql.{{ .Values.global.namespace }}.svc.cluster.local:5432/{{ .Values.postgresql.auth.database }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.backend.env.SPRING_DATASOURCE_USERNAME }}"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "{{ .Values.postgresql.auth.existingSecret }}"
                  key: "{{ .Values.postgresql.auth.secretKeys.userPasswordKey }}"
            - name: NEOHOODS_PORTAL_BASE_URL
              value: "https://{{ .Values.global.domain }}"
            - name: NEOHOODS_PORTAL_FRONTEND_URL
              value: "https://{{ .Values.global.domain }}"
            {{- if .Values.backend.env.NEOHOODS_PORTAL_SUPER_ADMIN_EMAIL }}
            - name: NEOHOODS_PORTAL_SUPER_ADMIN_EMAIL
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_SUPER_ADMIN_EMAIL | quote }}
            {{- end }}
            - name: NEOHOODS_PORTAL_USAGE_CONDITIONS_VERSION
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_USAGE_CONDITIONS_VERSION | default "1" | quote }}
            - name: NEOHOODS_PORTAL_SESSION_COOKIE_SECURE
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_SESSION_COOKIE_SECURE | default "true" | quote }}
            - name: NEOHOODS_PORTAL_MOBILE_DEV_ORIGIN
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_MOBILE_DEV_ORIGIN | default "" | quote }}
            - name: NEOHOODS_PORTAL_ADDITIONAL_CORS_ORIGINS
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_ADDITIONAL_CORS_ORIGINS | default "" | quote }}
            - name: NEOHOODS_PORTAL_MAILERSEND_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.NEOHOODS_PORTAL_MAILERSEND_WEBHOOK_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.NEOHOODS_PORTAL_MAILERSEND_WEBHOOK_SECRET.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_INCIDENTS_EMAIL_FROM
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_INCIDENTS_EMAIL_FROM | default "support@ms.mail.neohoods.com" | quote }}
            - name: NEOHOODS_PORTAL_INCIDENTS_EMAIL_FROM_NAME
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_INCIDENTS_EMAIL_FROM_NAME | default "NeoHoods Support" | quote }}
            - name: NEOHOODS_PORTAL_GDPR_EMAIL_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.NEOHOODS_PORTAL_GDPR_EMAIL_HASH_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.NEOHOODS_PORTAL_GDPR_EMAIL_HASH_SECRET.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_AUTH_JWT_SIGNING_PRIVATE_JWK
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.NEOHOODS_PORTAL_AUTH_JWT_SIGNING_PRIVATE_JWK.secretKeyRef.name }}
                  key: {{ .Values.backend.env.NEOHOODS_PORTAL_AUTH_JWT_SIGNING_PRIVATE_JWK.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_AUTH_JWT_SIGNING_KID
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_AUTH_JWT_SIGNING_KID | default "neohoods" | quote }}
            - name: NEOHOODS_PORTAL_GDPR_ANONYMIZATION_DELAY_DAYS
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_GDPR_ANONYMIZATION_DELAY_DAYS | default "30" | quote }}
            - name: NEOHOODS_PORTAL_MOBILE_SESSION_JWT_VALIDITY_DAYS
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_MOBILE_SESSION_JWT_VALIDITY_DAYS | default "30" | quote }}
            - name: NEOHOODS_PORTAL_TV_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.NEOHOODS_PORTAL_TV_JWT_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.NEOHOODS_PORTAL_TV_JWT_SECRET.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_TV_JWT_ISSUER
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_TV_JWT_ISSUER | default "tv-display" | quote }}
            - name: NEOHOODS_PORTAL_TV_JWT_AUDIENCE
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_TV_JWT_AUDIENCE | default "neohoods-portal" | quote }}
            - name: NEOHOODS_PORTAL_TV_MAX_SLIDES
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_TV_MAX_SLIDES | default "10" | quote }}
            - name: NEOHOODS_PORTAL_ERROR_NOTIFICATION_ENABLED
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_ERROR_NOTIFICATION_ENABLED | default "false" | quote }}
            - name: NEOHOODS_PORTAL_ERROR_NOTIFICATION_ADMIN_EMAIL
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_ERROR_NOTIFICATION_ADMIN_EMAIL | default "" | quote }}
            - name: NEOHOODS_PORTAL_ERROR_NOTIFICATION_GRAFANA_URL
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_ERROR_NOTIFICATION_GRAFANA_URL | default "https://grafana.neohoods.com" | quote }}
            - name: NEOHOODS_PORTAL_ERROR_NOTIFICATION_BACKEND_APP_NAME
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_ERROR_NOTIFICATION_BACKEND_APP_NAME | default "" | quote }}
            - name: APP_BASE_URL
              value: {{ .Values.backend.env.APP_BASE_URL | default (printf "https://%s" .Values.global.domain) | quote }}
            - name: NEOHOODS_PORTAL_ID
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_ID | default "neohoods-portal" | quote }}
            - name: NEOHOODS_TENANT_ROUTING_ENABLED
              value: {{ .Values.backend.env.NEOHOODS_TENANT_ROUTING_ENABLED | default "true" | quote }}
            - name: NEOHOODS_TENANT_FLYWAY_REPAIR_BEFORE_MIGRATE
              value: {{ .Values.backend.env.NEOHOODS_TENANT_FLYWAY_REPAIR_BEFORE_MIGRATE | default "false" | quote }}
            - name: NEOHOODS_NOTIFICATION_DEFAULT_ENABLE
              value: {{ .Values.backend.env.NEOHOODS_NOTIFICATION_DEFAULT_ENABLE | default "false" | quote }}
            - name: NEOHOODS_NOTIFICATION_NEWSLETTER_DEFAULT
              value: {{ .Values.backend.env.NEOHOODS_NOTIFICATION_NEWSLETTER_DEFAULT | default "false" | quote }}
            - name: MAILERSEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mailersend.apiKey.secretKeyRef.name }}
                  key: {{ .Values.mailersend.apiKey.secretKeyRef.key }}
            - name: MAILERSEND_FROM_EMAIL
              value: "{{ .Values.mailersend.from.email }}"
            - name: MAILERSEND_FROM_NAME
              value: "{{ .Values.mailersend.from.name }}"
            - name: MANAGEMENT_ENDPOINTS_WEB_BASE_PATH
              value: "/api/actuator"
            - name: AUTH0_DOMAIN
              value: "{{ .Values.backend.env.AUTH0_DOMAIN }}"
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.AUTH0_CLIENT_ID.secretKeyRef.name }}
                  key: {{ .Values.backend.env.AUTH0_CLIENT_ID.secretKeyRef.key }}
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.AUTH0_CLIENT_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.AUTH0_CLIENT_SECRET.secretKeyRef.key }}
            - name: AUTH0_AUDIENCE
              value: "{{ .Values.backend.env.AUTH0_AUDIENCE }}"
            - name: AUTH0_CONNECTION
              value: "{{ .Values.backend.env.AUTH0_CONNECTION }}"
            # SSO configuration
            - name: NEOHOODS_PORTAL_SSO_ENABLED
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_SSO_ENABLED }}"
            - name: NEOHOODS_PORTAL_SSO_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.NEOHOODS_PORTAL_SSO_CLIENT_ID.secretKeyRef.name }}
                  key: {{ .Values.backend.env.NEOHOODS_PORTAL_SSO_CLIENT_ID.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_SSO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.NEOHOODS_PORTAL_SSO_CLIENT_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.NEOHOODS_PORTAL_SSO_CLIENT_SECRET.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_SSO_TOKEN_ENDPOINT
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_SSO_TOKEN_ENDPOINT }}"
            - name: NEOHOODS_PORTAL_SSO_AUTHORIZATION_ENDPOINT
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_SSO_AUTHORIZATION_ENDPOINT }}"
            - name: NEOHOODS_PORTAL_SSO_SCOPE
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_SSO_SCOPE }}"
            - name: NEOHOODS_PORTAL_EMAIL_TEMPLATE_LOGO_URL
              value: "{{ .Values.global.emailTemplate.logoUrl }}"
            - name: NEOHOODS_PORTAL_EMAIL_TEMPLATE_APP_NAME
              value: {{ .Values.global.emailTemplate.appName | quote }}
            # OpenTelemetry configuration
            - name: MANAGEMENT_OTLP_METRICS_ENABLED
              value: "{{ .Values.backend.env.MANAGEMENT_OTLP_METRICS_ENABLED }}"
            - name: MANAGEMENT_OTLP_TRACING_ENABLED
              value: "{{ .Values.backend.env.MANAGEMENT_OTLP_TRACING_ENABLED }}"
            - name: MANAGEMENT_METRICS_EXPORT_OTLP_ENABLED
              value: "{{ .Values.backend.env.MANAGEMENT_METRICS_EXPORT_OTLP_ENABLED }}"
            - name: MANAGEMENT_TRACING_OTLP_ENDPOINT
              value: http://tempo.observability.svc.cluster.local:4317
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_URL
              value: http://grafana-k8s-monitoring-alloy-receiver.monitoring.svc.cluster.local:4318/v1/metrics
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: service.name=portal-platform-api
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.STRIPE_SECRET_KEY.secretKeyRef.name }}
                  key: {{ .Values.backend.env.STRIPE_SECRET_KEY.secretKeyRef.key }}
            - name: STRIPE_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.STRIPE_PUBLISHABLE_KEY.secretKeyRef.name }}
                  key: {{ .Values.backend.env.STRIPE_PUBLISHABLE_KEY.secretKeyRef.key }}
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.STRIPE_WEBHOOK_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.STRIPE_WEBHOOK_SECRET.secretKeyRef.key }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.JWT_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.JWT_SECRET.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_MAIL_SILENT_MODE
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_MAIL_SILENT_MODE }}"
            - name: NEOHOODS_PORTAL_MAIL_WHITELIST
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_MAIL_WHITELIST }}"
            # Matrix configuration
            - name: MATRIX_BOT_ENABLED
              value: "{{ .Values.backend.env.MATRIX_BOT_ENABLED }}"
            - name: MATRIX_HOMESERVER_URL
              value: "{{ .Values.backend.env.MATRIX_HOMESERVER_URL }}"
            - name: MATRIX_SERVER_NAME
              value: "{{ .Values.backend.env.MATRIX_SERVER_NAME }}"
            - name: MATRIX_INITIALIZATION_ENABLED
              value: "{{ .Values.backend.env.MATRIX_INITIALIZATION_ENABLED }}"
            - name: MATRIX_SYNC_SCHEDULED_ENABLED
              value: "{{ .Values.backend.env.MATRIX_SYNC_SCHEDULED_ENABLED }}"
            - name: MATRIX_SYNC_CRON
              value: "{{ .Values.backend.env.MATRIX_SYNC_CRON }}"
            - name: MATRIX_SYNC_POSTGRES_POLLING_ADVISORY_LOCK
              value: "{{ .Values.backend.env.MATRIX_SYNC_POSTGRES_POLLING_ADVISORY_LOCK }}"
            - name: MATRIX_SYNC_ROOM_NAME_PREFIX_WITH_TENANT
              value: "{{ .Values.backend.env.MATRIX_SYNC_ROOM_NAME_PREFIX_WITH_TENANT }}"
            - name: MATRIX_MAS_URL
              value: "{{ .Values.backend.env.MATRIX_MAS_URL }}"
            - name: MATRIX_MAS_AUTH0_PROVIDER_ID
              value: {{ .Values.backend.env.MATRIX_MAS_AUTH0_PROVIDER_ID | default "01HFVBY12TMNTYTBV8W921M5FA" | quote }}
            - name: MATRIX_ROOMS_CONFIG_FILE
              value: "{{ .Values.backend.env.MATRIX_ROOMS_CONFIG_FILE }}"
            - name: MATRIX_INITIALIZATION_ADMIN_USERS
              value: {{ .Values.backend.env.MATRIX_INITIALIZATION_ADMIN_USERS | quote }}
            - name: MATRIX_OAUTH2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.MATRIX_OAUTH2_CLIENT_ID.secretKeyRef.name }}
                  key: {{ .Values.backend.env.MATRIX_OAUTH2_CLIENT_ID.secretKeyRef.key }}
            - name: MATRIX_OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.MATRIX_OAUTH2_CLIENT_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.MATRIX_OAUTH2_CLIENT_SECRET.secretKeyRef.key }}
            - name: MATRIX_OAUTH2_REDIRECT_URI
              value: "{{ .Values.backend.env.MATRIX_OAUTH2_REDIRECT_URI }}"
            - name: MATRIX_OAUTH2_SCOPE
              value: "{{ .Values.backend.env.MATRIX_OAUTH2_SCOPE }}"
            - name: MATRIX_OAUTH2_AUTHORIZATION_ENDPOINT
              value: "{{ .Values.backend.env.MATRIX_OAUTH2_AUTHORIZATION_ENDPOINT }}"
            - name: MATRIX_OAUTH2_TOKEN_ENDPOINT
              value: "{{ .Values.backend.env.MATRIX_OAUTH2_TOKEN_ENDPOINT }}"
            - name: MATRIX_OAUTH2_ADMIN_TOKEN_ENDPOINT
              value: {{ .Values.backend.env.MATRIX_OAUTH2_ADMIN_TOKEN_ENDPOINT | default "" | quote }}
            - name: MATRIX_OAUTH2_DEVICE_AUTHORIZATION_ENDPOINT
              value: "{{ .Values.backend.env.MATRIX_OAUTH2_DEVICE_AUTHORIZATION_ENDPOINT }}"
            # Matrix Local Assistant configuration (Alfred)
            - name: MATRIX_LOCAL_ASSISTANT_ENABLED
              value: "{{ .Values.backend.env.MATRIX_LOCAL_ASSISTANT_ENABLED }}"
            - name: MATRIX_LOCAL_ASSISTANT_USER_ID
              value: "{{ .Values.backend.env.MATRIX_LOCAL_ASSISTANT_USER_ID }}"
            - name: MATRIX_LOCAL_ASSISTANT_PERMANENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.MATRIX_LOCAL_ASSISTANT_PERMANENT_TOKEN.secretKeyRef.name }}
                  key: {{ .Values.backend.env.MATRIX_LOCAL_ASSISTANT_PERMANENT_TOKEN.secretKeyRef.key }}
            - name: MATRIX_LOCAL_ASSISTANT_AVATAR_URL
              value: "{{ .Values.backend.env.MATRIX_LOCAL_ASSISTANT_AVATAR_URL }}"
            - name: MATRIX_LOCAL_ASSISTANT_DISPLAY_NAME
              value: "{{ .Values.backend.env.MATRIX_LOCAL_ASSISTANT_DISPLAY_NAME }}"
            # Neohoods-Corporate Matrix space (IT room, superadmin sync, init summary); maps to neohoods.portal.matrix.corporate-space-id
            - name: NEOHOODS_PORTAL_MATRIX_CORPORATE_SPACE_ID
              value: {{ .Values.backend.env.NEOHOODS_PORTAL_MATRIX_CORPORATE_SPACE_ID | default "" | quote }}
            # Assistant AI configuration
            - name: ASSISTANT_AI_ENABLED
              value: "{{ .Values.backend.env.ASSISTANT_AI_ENABLED }}"
            - name: ASSISTANT_AI_PROVIDER
              value: "{{ .Values.backend.env.ASSISTANT_AI_PROVIDER }}"
            - name: MISTRAL_AI_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.MISTRAL_AI_TOKEN.secretKeyRef.name }}
                  key: {{ .Values.backend.env.MISTRAL_AI_TOKEN.secretKeyRef.key }}
            - name: ASSISTANT_AI_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_MODEL }}"
            # Assistant AI Agent Models (per-agent customization)
            - name: ASSISTANT_AI_AGENT_ROUTER_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_ROUTER_MODEL }}"
            - name: ASSISTANT_AI_AGENT_GENERAL_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_GENERAL_MODEL }}"
            - name: ASSISTANT_AI_AGENT_RESIDENT_INFO_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_RESIDENT_INFO_MODEL }}"
            - name: ASSISTANT_AI_AGENT_SPACE_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_SPACE_MODEL }}"
            # Assistant AI Agent Space Step Models (per-step customization)
            - name: ASSISTANT_AI_AGENT_SPACE_STEP_REQUEST_SPACE_INFO_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_SPACE_STEP_REQUEST_SPACE_INFO_MODEL }}"
            - name: ASSISTANT_AI_AGENT_SPACE_STEP_CHOOSE_SPACE_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_SPACE_STEP_CHOOSE_SPACE_MODEL }}"
            - name: ASSISTANT_AI_AGENT_SPACE_STEP_CONFIRM_RESERVATION_SUMMARY_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_SPACE_STEP_CONFIRM_RESERVATION_SUMMARY_MODEL }}"
            - name: ASSISTANT_AI_AGENT_SPACE_STEP_COMPLETE_RESERVATION_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_SPACE_STEP_COMPLETE_RESERVATION_MODEL }}"
            - name: ASSISTANT_AI_AGENT_SPACE_STEP_PAYMENT_INSTRUCTIONS_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_SPACE_STEP_PAYMENT_INSTRUCTIONS_MODEL }}"
            - name: ASSISTANT_AI_AGENT_HELP_MODEL
              value: "{{ .Values.backend.env.ASSISTANT_AI_AGENT_HELP_MODEL }}"
            # Assistant LLM Judge configuration
            - name: ASSISTANT_LLM_JUDGE_ENABLED
              value: "{{ .Values.backend.env.ASSISTANT_LLM_JUDGE_ENABLED }}"
            # Assistant Conversation configuration
            - name: ASSISTANT_CONVERSATION_TIMEOUT_HOURS
              value: "{{ .Values.backend.env.ASSISTANT_CONVERSATION_TIMEOUT_HOURS }}"
            - name: ASSISTANT_CONVERSATION_DATE_FORMAT_TIMEZONE
              value: "{{ .Values.backend.env.ASSISTANT_CONVERSATION_DATE_FORMAT_TIMEZONE }}"
            # Assistant RAG configuration
            - name: ASSISTANT_RAG_ENABLED
              value: "{{ .Values.backend.env.ASSISTANT_RAG_ENABLED }}"
            - name: ASSISTANT_RAG_CUSTOM_DOC_FILE
              value: "{{ .Values.backend.env.ASSISTANT_RAG_CUSTOM_DOC_FILE }}"
            # Assistant MCP configuration
            - name: ASSISTANT_MCP_ENABLED
              value: "{{ .Values.backend.env.ASSISTANT_MCP_ENABLED }}"
            - name: ASSISTANT_MCP_BASE_URL
              value: "{{ .Values.backend.env.ASSISTANT_MCP_BASE_URL }}"
            # Assistant Reminders configuration
            - name: ASSISTANT_REMINDERS_ENABLED
              value: "{{ .Values.backend.env.ASSISTANT_REMINDERS_ENABLED }}"
            - name: ASSISTANT_REMINDERS_BEFORE_HOURS
              value: "{{ .Values.backend.env.ASSISTANT_REMINDERS_BEFORE_HOURS }}"
            - name: ASSISTANT_REMINDERS_CHECKOUT_HOURS
              value: "{{ .Values.backend.env.ASSISTANT_REMINDERS_CHECKOUT_HOURS }}"
            - name: ASSISTANT_REMINDERS_FEEDBACK_DAYS
              value: "{{ .Values.backend.env.ASSISTANT_REMINDERS_FEEDBACK_DAYS }}"
            # Assistant Notifications configuration
            - name: ASSISTANT_NOTIFICATIONS_ENABLED
              value: "{{ .Values.backend.env.ASSISTANT_NOTIFICATIONS_ENABLED }}"
            # Matrix Exception Notification configuration
            - name: MATRIX_EXCEPTION_NOTIFICATION_ENABLED
              value: "{{ .Values.backend.env.MATRIX_EXCEPTION_NOTIFICATION_ENABLED }}"
            - name: GRAFANA_URL
              value: "{{ .Values.backend.env.GRAFANA_URL }}"
            - name: BACKEND_APP_NAME
              value: "portal-{{ .Release.Name }}-backend"
            # Cleaning Calendar configuration
            - name: CLEANING_CALENDAR_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.CLEANING_CALENDAR_JWT_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.CLEANING_CALENDAR_JWT_SECRET.secretKeyRef.key }}
            # Bot JWT configuration
            - name: NEOHOODS_PORTAL_BOT_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.NEOHOODS_PORTAL_BOT_JWT_SECRET.secretKeyRef.name }}
                  key: {{ .Values.backend.env.NEOHOODS_PORTAL_BOT_JWT_SECRET.secretKeyRef.key }}
            - name: NEOHOODS_PORTAL_BOT_JWT_ISSUER
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_BOT_JWT_ISSUER }}"
            - name: NEOHOODS_PORTAL_BOT_JWT_AUDIENCE
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_BOT_JWT_AUDIENCE }}"
            # Spaces platform fees configuration
            - name: NEOHOODS_PORTAL_SPACES_DEFAULT_PLATFORM_FEE_PERCENTAGE
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_SPACES_DEFAULT_PLATFORM_FEE_PERCENTAGE }}"
            - name: NEOHOODS_PORTAL_SPACES_DEFAULT_PLATFORM_FIXED_FEE
              value: "{{ .Values.backend.env.NEOHOODS_PORTAL_SPACES_DEFAULT_PLATFORM_FIXED_FEE }}"
            # S3 storage configuration
            - name: S3_ENABLED
              value: "{{ .Values.backend.env.S3_ENABLED }}"
            - name: S3_ENDPOINT
              value: "{{ .Values.backend.env.S3_ENDPOINT }}"
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.S3_ACCESS_KEY.secretKeyRef.name }}
                  key: {{ .Values.backend.env.S3_ACCESS_KEY.secretKeyRef.key }}
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.env.S3_SECRET_KEY.secretKeyRef.name }}
                  key: {{ .Values.backend.env.S3_SECRET_KEY.secretKeyRef.key }}
            - name: S3_BUCKET
              value: "{{ .Values.backend.env.S3_BUCKET }}"
            - name: S3_REGION
              value: "{{ .Values.backend.env.S3_REGION }}"
            # UniFi Access (Dream Wall) configuration; when unifiMock.enabled and UNIFI_CONTROLLER_URL not set, backend uses the mock service
            - name: UNIFI_CONTROLLER_ID
              value: {{ .Values.backend.env.UNIFI_CONTROLLER_ID | default "main-controller" | quote }}
            - name: UNIFI_CONTROLLER_NAME
              value: {{ .Values.backend.env.UNIFI_CONTROLLER_NAME | default "Contrôleur principal UniFi" | quote }}
            - name: UNIFI_CONTROLLER_MODEL
              value: {{ .Values.backend.env.UNIFI_CONTROLLER_MODEL | default "Dream-Wall" | quote }}
            - name: UNIFI_CONTROLLER_URL
              value: {{ if .Values.backend.env.UNIFI_CONTROLLER_URL }}{{ .Values.backend.env.UNIFI_CONTROLLER_URL | quote }}{{ else if .Values.unifiMock.enabled }}{{ printf "http://portal-%s-unifi-mock.%s.svc.cluster.local:8091" .Release.Name .Values.global.namespace | quote }}{{ else }}{{ "" | quote }}{{ end }}
            - name: UNIFI_API_KEY
              value: {{ .Values.backend.env.UNIFI_API_KEY | default "" | quote }}
            - name: UNIFI_ALLOW_INSECURE_SSL
              value: {{ .Values.backend.env.UNIFI_ALLOW_INSECURE_SSL | default "true" | quote }}
            - name: UNIFI_RETRY_MAX_ATTEMPTS
              value: {{ .Values.backend.env.UNIFI_RETRY_MAX_ATTEMPTS | default "3" | quote }}
            - name: UNIFI_RETRY_INITIAL_DELAY
              value: {{ .Values.backend.env.UNIFI_RETRY_INITIAL_DELAY | default "1000" | quote }}
            - name: UNIFI_RETRY_MULTIPLIER
              value: {{ .Values.backend.env.UNIFI_RETRY_MULTIPLIER | default "2" | quote }}
            - name: UNIFI_ADMIN_EMAIL
              value: {{ .Values.backend.env.UNIFI_ADMIN_EMAIL | default "admin@neohoods.com" | quote }}
          ports:
            - name: http-server
              containerPort: {{ .Values.backend.env.SERVER_PORT }}
            - name: debug
              containerPort: 5005
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/actuator/health
              port: {{ .Values.backend.env.SERVER_PORT }}
            initialDelaySeconds: 300
            periodSeconds: 5
          readinessProbe:
            initialDelaySeconds: 10
            periodSeconds: 2
            httpGet:
              path: /api/actuator/health
              port: {{ .Values.backend.env.SERVER_PORT }}
          {{- with .Values.backend.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.backend.matrixRooms.enabled }}
            - name: matrix-rooms-config
              mountPath: /app/matrix-default-rooms.yaml
              subPath: matrix-default-rooms.yaml
            {{- end }}
            {{- if .Values.backend.ragDocumentation.enabled }}
            - name: rag-documentation-config
              mountPath: /app/rag-custom-documentation.md
              subPath: rag-custom-documentation.md
            {{- end }}
      volumes:
        {{- if and .Values.postgresql.enabled .Values.flyway.enabled (eq (.Values.flyway.globalMigration | default "initContainer") "initContainer") }}
        - name: flyway-sql-init
          configMap:
            name: portal-{{ .Release.Name }}-flyway-sql-init
        - name: flyway-sql-global
          configMap:
            name: portal-{{ .Release.Name }}-flyway-sql-global
        {{- end }}
        {{- if .Values.backend.matrixRooms.enabled }}
        - name: matrix-rooms-config
          configMap:
            name: {{ if .Values.backend.matrixRooms.existingConfigMap }}{{ .Values.backend.matrixRooms.existingConfigMap }}{{ else }}{{ .Values.backend.matrixRooms.configMapName | default (printf "%s-matrix-rooms" .Release.Name) }}{{ end }}
        {{- end }}
        {{- if .Values.backend.ragDocumentation.enabled }}
        - name: rag-documentation-config
          configMap:
            name: {{ if .Values.backend.ragDocumentation.existingConfigMap }}{{ .Values.backend.ragDocumentation.existingConfigMap }}{{ else }}{{ .Values.backend.ragDocumentation.configMapName | default (printf "%s-rag-documentation" .Release.Name) }}{{ end }}
        {{- end }}
{{- end }}