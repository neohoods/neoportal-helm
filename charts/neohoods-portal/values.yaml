# Global variables for templating
global:
  namespace: platform
  domain: portal.neohoods.com
  chatName: neohoods
  emailTemplate:
    logoUrl: "https://portal.neohoods.com/logo-bright.png"
    appName: "NeoHoods"
# PostgreSQL (custom StatefulSet). NeoHoods SaaS shares this block — override in umbrella values if needed.
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18.1"
    pullPolicy: IfNotPresent
  primary:
    # Node selector to ensure pod is scheduled on the same node as the PVC
    # This is important for hostPath volumes which are bound to specific nodes
    nodeSelector:
      role: worker-1
    # Allow scheduling on master/control-plane when worker is down (e.g. dev cluster)
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
    persistence:
      enabled: true
      size: 10Gi
      storageClass: "" # Use default storage class
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  auth:
    database: neohoods_portal
    username: postgres_admin
    existingSecret: postgresql-secret
    secretKeys:
      adminPasswordKey: postgresql-password
      userPasswordKey: postgresql-password
      replicationPasswordKey: postgresql-password
# Backend settings
backend:
  enabled: true
  debug:
    enabled: false # Set to true in dev environment
  image:
    repository: ghcr.io/neohoods/portal-platform-api
    tag: 0.0.355
  replicaCount: 2
  service:
    type: ClusterIP # Changed from NodePort to ClusterIP for Ingress compatibility
    port: 80
    nodePort: 30096 # Only used if type is NodePort
    nodePortForDebug: 30197 # Only used if type is NodePort
  env:
    # Spring properties
    SERVER_PORT: 8486
    SPRING_PROFILES_ACTIVE: production
    SPRING_DATASOURCE_USERNAME: postgres_admin
    SPRING_DATASOURCE_URL: jdbc:postgresql://neohoods-postgresql.platform.svc.cluster.local:5432/neohoods_portal
    # OpenTelemetry configuration - using existing Tempo/Loki/Prometheus stack
    MANAGEMENT_OTLP_METRICS_ENABLED: "true"
    MANAGEMENT_OTLP_TRACING_ENABLED: "true"
    MANAGEMENT_METRICS_EXPORT_OTLP_ENABLED: "true"
    MANAGEMENT_OTLP_METRICS_URL: "http://tempo.observability.svc.cluster.local:4317/v1/metrics"
    MANAGEMENT_OTLP_TRACING_URL: "http://tempo.observability.svc.cluster.local:4317/v1/traces"
    MANAGEMENT_METRICS_EXPORT_OTLP_URL: "http://tempo.observability.svc.cluster.local:4317/v1/metrics"
    # Auth0 properties (tenant neohoods)
    AUTH0_DOMAIN: neohoods.eu.auth0.com
    AUTH0_CLIENT_ID:
      secretKeyRef:
        name: auth0-secret
        key: auth0-client-id
    AUTH0_CLIENT_SECRET:
      secretKeyRef:
        name: auth0-secret
        key: auth0-client-secret
    AUTH0_AUDIENCE: https://neohoods.eu.auth0.com/api/v2/
    AUTH0_CONNECTION: Username-Password-Authentication
    # Stripe properties (platform + fallback for new copros)
    STRIPE_SECRET_KEY:
      secretKeyRef:
        name: stripe-secret
        key: stripe-secret-key
    STRIPE_PUBLISHABLE_KEY:
      secretKeyRef:
        name: stripe-secret
        key: stripe-publishable-key
    STRIPE_WEBHOOK_SECRET:
      secretKeyRef:
        name: stripe-secret
        key: stripe-webhook-secret
    # Optional: keys copied into tenant_stripe_config when a copro is created (defaults to STRIPE_* via application.yml if unset).
    # NEOHOODS_PORTAL_STRIPE_SANDBOX_SECRET_KEY:
    #   secretKeyRef:
    #     name: stripe-secret
    #     key: stripe-secret-key
    JWT_SECRET:
      secretKeyRef:
        name: portal-secret
        key: jwt-secret
    NEOHOODS_PORTAL_MAIL_SILENT_MODE: "false"
    NEOHOODS_PORTAL_MAIL_WHITELIST: "quentincastel86@gmail.com"
    # Superadmin emails (comma-separated, SSO only). Include quentincastel86@gmail.com for dev/personal login.
    NEOHOODS_PORTAL_SUPER_ADMIN_EMAIL: "quentin.castel@neohoods.com,geoffroy.surault@neohoods.com,quentincastel86@gmail.com"
    NEOHOODS_PORTAL_USAGE_CONDITIONS_VERSION: "1"
    NEOHOODS_PORTAL_SESSION_COOKIE_SECURE: "true"
    NEOHOODS_PORTAL_MOBILE_DEV_ORIGIN: ""
    # Comma-separated extra browser origins for credentialed CORS. Usually empty in K8s: tenant ingress serves /api on the
    # same host as the SPA (same-origin). Set when the API is called from another origin (e.g. split hosting, local dev).
    NEOHOODS_PORTAL_ADDITIONAL_CORS_ORIGINS: ""
    NEOHOODS_PORTAL_MAILERSEND_WEBHOOK_SECRET:
      secretKeyRef:
        name: portal-secret
        key: mailersend-webhook-secret
    NEOHOODS_PORTAL_INCIDENTS_EMAIL_FROM: "support@ms.mail.neohoods.com"
    NEOHOODS_PORTAL_INCIDENTS_EMAIL_FROM_NAME: "NeoHoods Support"
    NEOHOODS_PORTAL_EMAIL_TEMPLATE_LEAFS_URL: "" # Optional; derived from frontend-url if empty
    NEOHOODS_PORTAL_EMAIL_TEMPLATE_LEAFS_ACCENT_URL: ""
    NEOHOODS_PORTAL_EMAIL_TEMPLATE_NOTIFICATIONS_URL: ""
    NEOHOODS_PORTAL_EMAIL_TEMPLATE_TEAM_SIGNATURE: ""
    NEOHOODS_PORTAL_GDPR_EMAIL_HASH_SECRET:
      secretKeyRef:
        name: portal-secret
        key: gdpr-email-hash-secret
    NEOHOODS_PORTAL_GDPR_ANONYMIZATION_DELAY_DAYS: "30"
    NEOHOODS_PORTAL_MOBILE_SESSION_JWT_VALIDITY_DAYS: "30"
    NEOHOODS_PORTAL_ERROR_NOTIFICATION_ENABLED: "false"
    NEOHOODS_PORTAL_ERROR_NOTIFICATION_ADMIN_EMAIL: "quentin.castel.neohoods+support@gmail.com"
    NEOHOODS_PORTAL_ERROR_NOTIFICATION_GRAFANA_URL: "https://grafana.neohoods.com"
    NEOHOODS_PORTAL_ERROR_NOTIFICATION_BACKEND_APP_NAME: "portal-neohoods-backend"
    # Optional: deep-link to a prefiltered Grafana dashboard for backend support investigations
    NEOHOODS_PORTAL_GRAFANA_SUPPORT_DASHBOARD_URL: ""
    APP_BASE_URL: "https://portal.neohoods.com"
    NEOHOODS_PORTAL_ID: "neohoods-portal"
    NEOHOODS_TENANT_ROUTING_ENABLED: "true"
    # One-shot: "true" runs Flyway repair() before tenant migrate (fix checksum drift / removed V*.sql), then set back to "false"
    NEOHOODS_TENANT_FLYWAY_REPAIR_BEFORE_MIGRATE: "false"
    # SSO configuration (Auth0 tenant neohoods)
    NEOHOODS_PORTAL_SSO_ENABLED: "true"
    NEOHOODS_PORTAL_SSO_CLIENT_ID:
      secretKeyRef:
        name: portal-secret
        key: sso-client-id
    NEOHOODS_PORTAL_SSO_CLIENT_SECRET:
      secretKeyRef:
        name: portal-secret
        key: sso-client-secret
    NEOHOODS_PORTAL_SSO_TOKEN_ENDPOINT: "https://neohoods.eu.auth0.com/oauth/token"
    NEOHOODS_PORTAL_SSO_AUTHORIZATION_ENDPOINT: "https://neohoods.eu.auth0.com/authorize"
    NEOHOODS_PORTAL_SSO_SCOPE: "openid profile email"
    # Matrix configuration
    MATRIX_BOT_ENABLED: "true"
    MATRIX_HOMESERVER_URL: "matrix.neohoods.com"
    MATRIX_SERVER_NAME: "chat.neohoods.com"
    MATRIX_INITIALIZATION_ENABLED: "true"
    # Scheduled Matrix sync (all copros) — off by default; use UI/API manual sync. Enable with "true"
    MATRIX_SYNC_SCHEDULED_ENABLED: "false"
    MATRIX_SYNC_CRON: "0 0 1 * * ?"
    # When true, Matrix room names in each copro space become "{tenant name} — {room}". Default false (avoid duplicate rooms on existing homeservers).
    MATRIX_SYNC_ROOM_NAME_PREFIX_WITH_TENANT: "false"
    MATRIX_MAS_URL: "https://mas.chat.neohoods.com"
    # Must match upstream_oauth2.providers[].id in MAS config (ULID, 26 chars)
    MATRIX_MAS_AUTH0_PROVIDER_ID: "01HFVBY12TMNTYTBV8W921M5FA"
    MATRIX_ROOMS_CONFIG_FILE: "file:/app/matrix-default-rooms.yaml"
    MATRIX_INITIALIZATION_ADMIN_USERS: "@quentincastel86:chat.neohoods.com"
    MATRIX_OAUTH2_CLIENT_ID:
      secretKeyRef:
        name: matrix-secret
        key: oauth2-client-id
    MATRIX_OAUTH2_CLIENT_SECRET:
      secretKeyRef:
        name: matrix-secret
        key: oauth2-client-secret
    MATRIX_OAUTH2_REDIRECT_URI: "https://portal.neohoods.com/api/admin/matrix-bot/oauth2/callback"
    MATRIX_OAUTH2_SCOPE: "urn:matrix:client:api:* urn:synapse:admin:* urn:matrix:client:device:BOT-PERMANENT-TOKEN"
    MATRIX_OAUTH2_AUTHORIZATION_ENDPOINT: "https://matrix.neohoods.com/_matrix/client/v3/oauth2/authorize"
    MATRIX_OAUTH2_TOKEN_ENDPOINT: "https://matrix.neohoods.com/_matrix/client/v3/oauth2/token"
    # MAS token endpoint for admin (client_credentials) flow; auto-derived from device endpoint if empty
    # Set explicitly for user creation via MAS Admin API (e.g. https://mas.chat.neohoods.com/oauth2/token)
    MATRIX_OAUTH2_ADMIN_TOKEN_ENDPOINT: "https://mas.chat.neohoods.com/oauth2/token"
    MATRIX_OAUTH2_DEVICE_AUTHORIZATION_ENDPOINT: "https://mas.chat.neohoods.com/oauth2/device"
    # Matrix Local Assistant configuration (Alfred)
    MATRIX_LOCAL_ASSISTANT_ENABLED: "true"
    MATRIX_LOCAL_ASSISTANT_USER_ID: "@alfred:chat.neohoods.com"
    MATRIX_LOCAL_ASSISTANT_PERMANENT_TOKEN:
      secretKeyRef:
        name: matrix-secret
        key: local-assistant-permanent-token
    MATRIX_LOCAL_ASSISTANT_AVATAR_URL: "https://neohoods.com/assets/chat/alfred-avatar.png"
    MATRIX_LOCAL_ASSISTANT_DISPLAY_NAME: "Alfred [Assistant AI]"
    # Neohoods-Corporate space on prod homeserver (room IT, superadmin invites)
    NEOHOODS_PORTAL_MATRIX_CORPORATE_SPACE_ID: "!HeEWdDidvRFUVtmWwa:chat.neohoods.com"
    # Assistant AI configuration (LLM stack). Runtime on/off for Matrix bot replies is also stored in
    # global.system_settings.matrix_assistant_enabled (superadmin: System → Matrix — Configuration).
    ASSISTANT_AI_ENABLED: "true"
    ASSISTANT_AI_PROVIDER: "mistral"
    MISTRAL_AI_TOKEN:
      secretKeyRef:
        name: matrix-secret
        key: mistral-ai-token
    ASSISTANT_AI_MODEL: "devstral-medium-latest" # Default model (fallback)
    # Assistant AI Agent Models (per-agent customization)
    ASSISTANT_AI_AGENT_ROUTER_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_GENERAL_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_RESIDENT_INFO_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_SPACE_MODEL: "devstral-medium-latest"
    # Assistant AI Agent Space Step Models (per-step customization)
    ASSISTANT_AI_AGENT_SPACE_STEP_REQUEST_SPACE_INFO_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_SPACE_STEP_CHOOSE_SPACE_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_SPACE_STEP_CONFIRM_RESERVATION_SUMMARY_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_SPACE_STEP_COMPLETE_RESERVATION_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_SPACE_STEP_PAYMENT_INSTRUCTIONS_MODEL: "devstral-medium-latest"
    ASSISTANT_AI_AGENT_HELP_MODEL: "devstral-medium-latest"
    # Assistant LLM Judge configuration
    ASSISTANT_LLM_JUDGE_ENABLED: "true"
    # Assistant Conversation configuration
    ASSISTANT_CONVERSATION_TIMEOUT_HOURS: "1" # Timeout in hours to create a new conversation
    ASSISTANT_CONVERSATION_DATE_FORMAT_TIMEZONE: "UTC" # Timezone for date format
    # Assistant RAG configuration
    ASSISTANT_RAG_ENABLED: "true"
    ASSISTANT_RAG_CUSTOM_DOC_FILE: "file:/app/rag-custom-documentation.md"
    # Assistant MCP configuration
    ASSISTANT_MCP_ENABLED: "true"
    ASSISTANT_MCP_BASE_URL: "http://localhost:8080/mcp"
    # Assistant Reminders configuration
    ASSISTANT_REMINDERS_ENABLED: "false"
    ASSISTANT_REMINDERS_BEFORE_HOURS: "24"
    ASSISTANT_REMINDERS_CHECKOUT_HOURS: "9"
    ASSISTANT_REMINDERS_FEEDBACK_DAYS: "1"
    # Assistant Notifications configuration
    ASSISTANT_NOTIFICATIONS_ENABLED: "false"
    # Matrix Exception Notification configuration
    MATRIX_EXCEPTION_NOTIFICATION_ENABLED: "true"
    GRAFANA_URL: "https://grafana.neohoods.com"
    # Cleaning Calendar configuration
    CLEANING_CALENDAR_JWT_SECRET:
      secretKeyRef:
        name: portal-secret
        key: cleaning-calendar-jwt-secret
    # Bot JWT configuration
    NEOHOODS_PORTAL_BOT_JWT_SECRET:
      secretKeyRef:
        name: portal-secret
        key: bot-jwt-secret
    NEOHOODS_PORTAL_BOT_JWT_ISSUER: "matrix-sync-bot"
    NEOHOODS_PORTAL_BOT_JWT_AUDIENCE: "neohoods-portal"
    # TV configuration
    NEOHOODS_PORTAL_TV_JWT_SECRET:
      secretKeyRef:
        name: portal-secret
        key: tv-jwt-secret
    NEOHOODS_PORTAL_TV_JWT_ISSUER: "tv-display"
    NEOHOODS_PORTAL_TV_JWT_AUDIENCE: "neohoods-portal"
    NEOHOODS_PORTAL_TV_MAX_SLIDES: "10"
    # Spaces platform fees configuration
    NEOHOODS_PORTAL_SPACES_DEFAULT_PLATFORM_FEE_PERCENTAGE: "2.00"
    NEOHOODS_PORTAL_SPACES_DEFAULT_PLATFORM_FIXED_FEE: "0.25"
    # S3 storage configuration
    S3_ENABLED: "true"
    S3_ENDPOINT: "https://s3.fr-par.scw.cloud"
    S3_ACCESS_KEY:
      secretKeyRef:
        name: portal-secret
        key: scaleway-access-key
    S3_SECRET_KEY:
      secretKeyRef:
        name: portal-secret
        key: scaleway-secret-key
    S3_BUCKET: "" # e.g., "terresdelaya" or "neohoods-dev"
    S3_REGION: "fr-par" # Scaleway Paris region
    # Optional: public URLs to portal and Matrix backups (e.g. Scaleway Object Browser / S3 static index)
    NEOHOODS_PORTAL_BACKUP_URL: ""
    NEOHOODS_MATRIX_BACKUP_URL: ""
    # UniFi Access (Dream Wall) - leave empty for prod or set UNIFI_CONTROLLER_URL; when unifiMock.enabled, URL defaults to mock service
    UNIFI_CONTROLLER_ID: "" # e.g. "main-controller"
    UNIFI_CONTROLLER_NAME: "" # e.g. "Contrôleur principal UniFi"
    UNIFI_CONTROLLER_MODEL: "" # e.g. "Dream-Wall"
    UNIFI_CONTROLLER_URL: "" # e.g. "https://192.168.10.1:12445" or leave empty when using unifiMock
    UNIFI_API_KEY: "" # API token from Access > Settings > API Token (use secretKeyRef in env overrides if needed)
    UNIFI_ALLOW_INSECURE_SSL: "true" # Use only in dev/test for self-signed certs
    UNIFI_RETRY_MAX_ATTEMPTS: "3"
    UNIFI_RETRY_INITIAL_DELAY: "1000"
    UNIFI_RETRY_MULTIPLIER: "2"
    UNIFI_ADMIN_EMAIL: "admin@neohoods.com"
  matrixRooms:
    enabled: true
    configMapName: "" # Default: {{ .Release.Name }}-matrix-rooms
    inline: "" # YAML content inline (optional)
    existingConfigMap: "" # Reference to existing ConfigMap (optional)
  ragDocumentation:
    enabled: true
    configMapName: "" # Default: {{ .Release.Name }}-rag-documentation
    inline: "" # Markdown content inline (optional). Use sections separated by "---" for multiple topics.
    existingConfigMap: "" # Reference to existing ConfigMap (optional). If set, uses this ConfigMap instead of creating one.
    # Example inline content:
    # inline: |
    #   ---
    #   Structure des bâtiments
    #
    #   La copropriété a 3 bâtiments : A, B, C.
    #   Format : [Bâtiment][Étage][Numéro] (ex: A701, C302)
    #   ---
ingress:
  certManagerClusterIssuer: letsencrypt-prod
  secretName: letsencrypt-platform
# Frontend settings
frontend:
  enabled: true
  image:
    repository: ghcr.io/neohoods/portal-platform-ui
    tag: 0.0.355
  replicaCount: 1
  service:
    type: ClusterIP # Changed from NodePort to ClusterIP for Ingress compatibility
    port: 80
    nodePort: 30095 # Only used if type is NodePort
  env:
    # OpenAPI base path. Default /api (relative) for same-origin + multi-domain ingress. Set absolute URL e.g. for split hosting or mobile CI.
    API_BASE_PATH: ""
    USE_MOCK_API: "false"
    DEMO_MODE: "false"
    DEFAULT_LOCALE: "fr"
    # Branding configuration
    BRAND_NAME: "NeoHoods"
    BRAND_DISPLAY_NAME: "Portal NeoHoods"
    BRAND_COPYRIGHT: "2025 Portal NeoHoods"
    BRAND_LOGO: "/logo-bright.png"
    STRIPE_DEMO_MODE: "false"
    # Version des conditions d'utilisation (doit correspondre au fichier assets/legal/usage-conditions-<n>.md et au backend)
    USAGE_CONDITIONS_VERSION: "1"
    # Feature flags
    INCIDENTS_ENABLED: "true"
  # Hostname -> tenant slug : `/` et redirection post-login hub → `/tenants/<slug>/residents` (DOMAIN_TENANT_MAP_JSON).
  # Déprécié en doublon de tenants.ingress : les hosts déclarés sous tenants.ingress.<slug>.host sont fusionnés automatiquement ;
  # ce map sert à ajouter des hosts sans Ingress dédié ou à surcharger une entrée.
  domainTenantMap: {}
  theme:
    configMapName: my-custom-theme
mailersend:
  enabled: true
  apiKey:
    secretKeyRef:
      name: mailersend-secret
      key: mailersend-api-key
  from:
    email: notifications@mail.neohoods.com
    name: NeoHoods
flyway:
  enabled: true
  # Global schema (sql-init + sql-global): run in backend pod initContainers (ordering vs Postgres, no separate Job).
  # Set to "job" only if you need the legacy Helm Flyway Job (e.g. migrate without starting the API).
  globalMigration: initContainer
  # One-shot: true runs `flyway repair` then `migrate` (aligns flyway_schema_history checksums with current SQL files).
  # Use after fixing/editing already-applied migrations, then set back to false.
  repairBeforeMigrate: false
  url: jdbc:postgresql://neohoods-postgresql.platform.svc.cluster.local:5432/neohoods_portal
  image:
    repository: flyway/flyway
    # Pin to the same major line as org.flywaydb:flyway-core from Spring Boot parent (platform-api).
    # "latest" (often Flyway 12+) caused checksum mismatches vs embedded Flyway 11.x when both ran on tenant SQL.
    tag: "11.7.2"
    pullPolicy: IfNotPresent
  config:
    schemas: public
    locations: "filesystem:/flyway/sql-init,filesystem:/flyway/sql-global"
  # NeoHoods SaaS flyway job resources (neohoods-dev / neohoods-prod)
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "1Gi"
      cpu: "1000m"
  # Custom initialization data
  customInitData:
    enabled: false
    configMapName: "portal-custom-init-data"
    mountPath: "/flyway/sql-custom"
    files: []
    sqlFiles: []
    fakeData: false
# Backup configuration (NeoHoods SaaS defaults — set scaleway.bucket per environment)
backup:
  enabled: true
  schedule: "0 2 * * *"
  keepBackups: 5
  backupPrefix: "backup_portal_db_"
  scaleway:
    bucket: ""
    endpoint: "s3.fr-par.scw.cloud"
    secretName: "portal-secret"
    accessKeyKey: "scaleway-access-key"
    secretKeyKey: "scaleway-secret-key"
  # Notifications via Synapse Client API. homeserver defaults to https://<backend.env.MATRIX_HOMESERVER_URL>; roomId must live on that server (override per env).
  matrix:
    enabled: true
    # homeserver: "https://matrix.chat.dev.neohoods.com"  # optional; omit to use backend Matrix URL
    roomId: "!BwHndjfcBjyYLOWDwU:chat.neohoods.com"
    secretName: "matrix-secret"
    tokenKey: "local-assistant-permanent-token"
  # Persistent volume for backups (optional, uses emptyDir if disabled)
  persistentVolumeClaim:
    enabled: true
    name: "" # Default: portal-{{ .Release.Name }}-backups
    size: "20Gi"
    storageClass: "" # Optional: specify storage class
# UniFi Mock Server configuration (single instance; Dream Wall can manage multiple doors)
unifiMock:
  enabled: false # Set to true for dev/test; backend will use this service when UNIFI_CONTROLLER_URL is not set
  image:
    repository: ghcr.io/neohoods/portal-unifi-mock-server
    tag: 0.0.355
  controllerName: "Contrôleur principal UniFi"
  doors: "door-1:Chambre d'hôtes,door-2:Salle commune,door-technical:Local technique"
# Hosts dédiés par tenant (un Ingress par entrée) — voir templates/ingress-tenants.yaml.
# Chaque host est aussi injecté dans DOMAIN_TENANT_MAP_JSON (host → slug) pour le front (plus besoin de dupliquer frontend.domainTenantMap).
# Auth0 : ajouter https://<host>/token-exchange dans Allowed Callback URLs (et Web Origins) pour chaque host.
tenants:
  ingressDefaults:
    certManagerClusterIssuer: letsencrypt-prod
    ingressClassName: nginx
  ingress: {}
